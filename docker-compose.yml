version: '3.8'

services:
  db:
    image: postgres:17
    container_name: fairshare-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-fairsharedb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fairshare-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-fairsharedb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    image: fairshare-api:latest
    container_name: fairshare-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-fairsharedb}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-prod}
    networks:
      - fairshare-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  fairshare-net:
    driver: bridge

volumes:
  postgres_data: